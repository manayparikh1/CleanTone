<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanTone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #a8e6cf 0%, #ffd3a5 50%, #ff8b94 100%);
      color: #2d1b2e;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      margin: 40px 0 60px 0;
      transform: rotate(-1deg);
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 52px;
      font-weight: 400;
      font-style: italic;
      color: #5d0f5a;
      margin-bottom: 5px;
      transform: skewY(-2deg);
      letter-spacing: 3px;
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'Comic Sans MS', cursive;
      font-size: 18px;
      color: #c44569;
      font-weight: 300;
      margin-top: 10px;
      font-style: oblique;
    }

    .main-card {
      background: #fff4e6;
      border: 4px solid #2d1b2e;
      border-radius: 15px;
      padding: 40px 30px;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.15);
      transform: rotate(0.5deg);
      margin-bottom: 30px;
    }

    .dropzone {
      border: 3px dashed #ff6b9d;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      background: linear-gradient(180deg, #fffacd 0%, #fff8dc 100%);
      transition: all 0.3s ease;
      transform: rotate(-0.5deg);
    }

    .dropzone:hover {
      border-color: #c44569;
      transform: rotate(0.3deg) scale(1.02);
      background: linear-gradient(180deg, #ffe4b5 0%, #ffd4a3 100%);
    }

    .dz-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: inline-block;
      animation: bob 2s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .dz-main {
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 20px;
      font-weight: bold;
      color: #2d1b2e;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .dz-sub {
      font-family: monospace;
      font-size: 13px;
      color: #a0522d;
      letter-spacing: 2px;
    }

    input[type=file] { display: none; }

    .filebox {
      display: none;
      background: #ffd4e5;
      border: 2px solid #ff6b9d;
      border-radius: 10px;
      padding: 15px 20px;
      margin-top: 20px;
      gap: 15px;
      align-items: center;
      font-family: monospace;
    }

    .filebox.show { display: flex; }
    .filebox .fi { font-size: 28px; }

    .fname {
      font-family: Georgia, serif;
      font-size: 14px;
      font-weight: bold;
      color: #5d0f5a;
    }

    .finfo {
      font-size: 12px;
      color: #8b4789;
      font-style: italic;
      margin-top: 3px;
    }

    .controls {
      display: none;
      margin-top: 25px;
      padding-top: 25px;
      border-top: 3px dotted #ff8b94;
    }

    .sec-lbl {
      font-family: 'Impact', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c44569;
      margin-bottom: 12px;
      font-weight: 900;
    }

    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .pre-btn {
      font-family: 'Courier New', monospace;
      padding: 9px 16px;
      border: 2px solid #2d1b2e;
      background: #fff;
      color: #2d1b2e;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      transform: rotate(-1deg);
    }

    .pre-btn:hover {
      background: #ffd4e5;
      transform: rotate(1deg) translateY(-2px);
    }

    .pre-btn.on {
      background: #ff6b9d;
      color: #fff;
      transform: rotate(2deg) scale(1.05);
    }

    .sliders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 25px;
      margin-bottom: 25px;
    }

    @media (max-width: 600px) {
      .sliders { grid-template-columns: 1fr; }
    }

    .slider-row label {
      display: flex;
      justify-content: space-between;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .sname { color: #2d1b2e; }
    .sval { color: #ff6b9d; font-weight: 800; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 7px;
      background: linear-gradient(90deg, #ffd3a5 0%, #ff8b94 100%);
      border-radius: 5px;
      outline: none;
      border: 2px solid #2d1b2e;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: #ff6b9d;
      border: 3px solid #2d1b2e;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .btn {
      font-family: 'Impact', sans-serif;
      padding: 12px 24px;
      border: 3px solid #2d1b2e;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-main {
      background: #ff6b9d;
      color: #fff;
      transform: rotate(1deg);
    }

    .btn-main:not(:disabled):hover {
      background: #ff5287;
      transform: rotate(-1deg) scale(1.05);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }

    .btn-out {
      background: #fff4e6;
      color: #2d1b2e;
      transform: rotate(-1deg);
    }

    .btn-out:not(:disabled):hover {
      background: #ffd3a5;
      transform: rotate(1deg) scale(1.05);
    }

    .msg {
      display: none;
      padding: 12px 16px;
      border-radius: 8px;
      border: 3px solid #2d1b2e;
      font-family: monospace;
      font-size: 13px;
      font-weight: 600;
      margin-top: 15px;
    }

    .msg.show { display: block; }
    .msg.ok { background: #d4ffd0; color: #2d1b2e; border-color: #2d1b2e; }
    .msg.err { background: #ffc0cb; color: #8b0000; border-color: #8b0000; }

    .results {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 25px;
    }

    .results.show { display: grid; }

    @media (max-width: 700px) {
      .results.show { grid-template-columns: 1fr; }
    }

    .track {
      background: #fffacd;
      border: 3px solid #2d1b2e;
      border-radius: 10px;
      padding: 18px;
      transform: rotate(-0.5deg);
    }

    .track.clean {
      border-color: #6ba83d;
      background: #f0fff0;
    }

    .track h4 {
      font-family: Georgia, serif;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #2d1b2e;
      font-style: italic;
    }

    .track.clean h4 { color: #6ba83d; }

    canvas {
      width: 100%;
      height: 90px;
      border: 2px solid #2d1b2e;
      border-radius: 6px;
      background: #fffef0;
      margin-bottom: 12px;
      display: block;
    }

    audio {
      width: 100%;
      border-radius: 6px;
    }

    .stats-row {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .stats-row.show { display: grid; }

    @media (max-width: 600px) {
      .stats-row.show { grid-template-columns: repeat(2, 1fr); }
    }

    .stat {
      background: linear-gradient(135deg, #ffd3a5 0%, #ff8b94 100%);
      border: 3px solid #2d1b2e;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      transform: rotate(1deg);
    }

    .stat-lbl {
      font-family: 'Impact', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5d0f5a;
      font-weight: 900;
    }

    .stat-val {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: bold;
      margin-top: 6px;
      color: #c44569;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(45,27,46,0.3);
      border-top-color: #2d1b2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CleanTone</h1>
      <p class="subtitle">make your recordings not sound like trash</p>
    </header>

    <div class="main-card">
      <label class="dropzone" id="drop" for="fileInput">
        <div class="dz-icon">🎤</div>
        <div class="dz-main">drop it here</div>
        <div class="dz-sub">mp3 or wav · under 50mb</div>
      </label>
      <input type="file" id="fileInput" accept=".mp3,.wav,audio/*">

      <div class="filebox" id="filebox">
        <div class="fi">📻</div>
        <div>
          <div class="fname" id="fname">—</div>
          <div class="finfo" id="finfo">—</div>
        </div>
      </div>

      <div class="controls" id="controls">
        <div class="sec-lbl">what do u want</div>
        <div class="presets" id="presets">
          <button class="pre-btn on" data-p="balanced">balanced</button>
          <button class="pre-btn" data-p="voice">voice</button>
          <button class="pre-btn" data-p="strings">strings</button>
          <button class="pre-btn" data-p="wind">wind</button>
          <button class="pre-btn" data-p="max">max clean</button>
        </div>

        <div class="sliders">
          <div class="slider-row">
            <label for="sNoise">
              <span class="sname">noise</span>
              <span class="sval" id="vNoise">75%</span>
            </label>
            <input type="range" id="sNoise" min="0" max="100" value="75">
          </div>
          <div class="slider-row">
            <label for="sHP">
              <span class="sname">rumble</span>
              <span class="sval" id="vHP">100 Hz</span>
            </label>
            <input type="range" id="sHP" min="20" max="250" value="100">
          </div>
          <div class="slider-row">
            <label for="sClarity">
              <span class="sname">clarity</span>
              <span class="sval" id="vClarity">+8</span>
            </label>
            <input type="range" id="sClarity" min="0" max="14" value="8">
          </div>
          <div class="slider-row">
            <label for="sWarmth">
              <span class="sname">warmth</span>
              <span class="sval" id="vWarmth">+2</span>
            </label>
            <input type="range" id="sWarmth" min="-4" max="6" value="2">
          </div>
        </div>

        <div class="buttons">
          <button class="btn btn-main" id="enhanceBtn">go</button>
          <button class="btn btn-out" id="downloadBtn" disabled>get it</button>
          <button class="btn btn-out" id="clearBtn">reset</button>
        </div>
        <div class="msg" id="msg"></div>
      </div>

      <div class="results" id="results">
        <div class="track">
          <h4>before (oof)</h4>
          <canvas id="canvasA"></canvas>
          <audio id="audioA" controls></audio>
        </div>
        <div class="track clean">
          <h4>after (nice)</h4>
          <canvas id="canvasB"></canvas>
          <audio id="audioB" controls></audio>
        </div>
      </div>

      <div class="stats-row" id="stats">
        <div class="stat">
          <div class="stat-lbl">removed</div>
          <div class="stat-val" id="sNoiseStat">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">louder</div>
          <div class="stat-val" id="sGain">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">length</div>
          <div class="stat-val" id="sDur">—</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">rate</div>
          <div class="stat-val" id="sSR">—</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var audioBuffer = null, enhancedBuf = null, wavUrl = null, origFile = null;
    var PRESETS = {
      balanced: { noise: 75, hp: 100, clarity: 8, warmth: 2 },
      voice: { noise: 82, hp: 120, clarity: 9, warmth: 1 },
      strings: { noise: 68, hp: 80, clarity: 7, warmth: 4 },
      wind: { noise: 78, hp: 110, clarity: 10, warmth: 0 },
      max: { noise: 95, hp: 130, clarity: 12, warmth: 1 },
    };

    function el(id) { return document.getElementById(id); }

    function updateLabels() {
      el('vNoise').textContent = el('sNoise').value + '%';
      el('vHP').textContent = el('sHP').value + ' Hz';
      el('vClarity').textContent = '+' + el('sClarity').value;
      var w = parseInt(el('sWarmth').value);
      el('vWarmth').textContent = (w >= 0 ? '+' : '') + w;
    }

    ['sNoise','sHP','sClarity','sWarmth'].forEach(s => el(s).addEventListener('input', updateLabels));
    updateLabels();

    el('presets').addEventListener('click', e => {
      var btn = e.target.closest('.pre-btn');
      if (!btn) return;
      document.querySelectorAll('.pre-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      var p = PRESETS[btn.dataset.p];
      el('sNoise').value = p.noise;
      el('sHP').value = p.hp;
      el('sClarity').value = p.clarity;
      el('sWarmth').value = p.warmth;
      updateLabels();
      showMsg('✓ loaded', 'ok');
      setTimeout(hideMsg, 1500);
    });

    var dropEl = el('drop');
    dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('over'); });
    dropEl.addEventListener('dragleave', () => dropEl.classList.remove('over'));
    dropEl.addEventListener('drop', e => {
      e.preventDefault();
      dropEl.classList.remove('over');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    el('fileInput').addEventListener('change', e => {
      if (e.target.files.length) loadFile(e.target.files[0]);
    });

    function showMsg(text, type) {
      var m = el('msg');
      m.textContent = text;
      m.className = 'msg show ' + (type || 'ok');
    }
    function hideMsg() { el('msg').className = 'msg'; }

    function fmtBytes(b) {
      if (b < 1024) return b + 'b';
      if (b < 1048576) return (b/1024).toFixed(1) + 'kb';
      return (b/1048576).toFixed(2) + 'mb';
    }
    function fmtTime(s) {
      var m = Math.floor(s/60), sec = Math.floor(s%60);
      return m > 0 ? m + 'm' + sec + 's' : sec + 's';
    }

    async function loadFile(file) {
      if (!file.type.startsWith('audio/') && !file.name.match(/\.(mp3|wav)$/i)) {
        showMsg('needs mp3 or wav', 'err'); return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showMsg('too big', 'err'); return;
      }
      origFile = file;
      el('fname').textContent = file.name;
      el('finfo').textContent = fmtBytes(file.size) + ' · decoding...';
      el('filebox').classList.add('show');
      el('controls').style.display = 'block';
      hideMsg();

      try {
        var arr = await file.arrayBuffer();
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        audioBuffer = await ctx.decodeAudioData(arr);
        ctx.close();
        var ch = audioBuffer.numberOfChannels === 1 ? 'mono' : 'stereo';
        el('finfo').textContent = fmtBytes(file.size) + ' · ' + fmtTime(audioBuffer.duration) + ' · ' + (audioBuffer.sampleRate/1000) + 'khz ' + ch;
        el('audioA').src = URL.createObjectURL(file);
        drawWave(el('canvasA'), audioBuffer, '#c44569');
        el('results').classList.add('show');
      } catch(err) {
        showMsg('cant decode', 'err');
      }
    }

    function drawWave(canvas, buf, color) {
      var dpr = window.devicePixelRatio || 1;
      var w = canvas.clientWidth || 400, h = canvas.clientHeight || 90;
      canvas.width = w * dpr; canvas.height = h * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);
      var data = buf.getChannelData(0);
      var step = Math.max(1, Math.floor(data.length / w));
      var mid = h / 2;
      ctx.fillStyle = color;
      for (var x = 0; x < w; x++) {
        var lo = 1, hi = -1;
        for (var i = 0; i < step; i++) {
          var v = data[x * step + i] || 0;
          if (v < lo) lo = v;
          if (v > hi) hi = v;
        }
        ctx.fillRect(x, mid + lo * mid * 0.95, 1, Math.max(1, (hi - lo) * mid * 0.95));
      }
    }

    el('enhanceBtn').addEventListener('click', runEnhance);
    el('downloadBtn').addEventListener('click', doDownload);
    el('clearBtn').addEventListener('click', clearAll);

    async function runEnhance() {
      if (!audioBuffer) { showMsg('load file first', 'err'); return; }
      el('enhanceBtn').disabled = true;
      el('enhanceBtn').innerHTML = '<span class="spinner"></span> working...';
      var t0 = performance.now();

      var noiseAmt = parseInt(el('sNoise').value) / 100;
      var hpFreq = parseInt(el('sHP').value);
      var clarity = parseInt(el('sClarity').value);
      var warmth = parseInt(el('sWarmth').value);

      try {
        var src = audioBuffer;
        var offline = new OfflineAudioContext(src.numberOfChannels, src.length, src.sampleRate);
        var node = offline.createBufferSource();
        node.buffer = src;

        var hp = offline.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = hpFreq; hp.Q.value = 0.7;

        var hp2 = offline.createBiquadFilter();
        hp2.type = 'highpass'; hp2.frequency.value = hpFreq; hp2.Q.value = 0.7;

        var mud = offline.createBiquadFilter();
        mud.type = 'peaking'; mud.frequency.value = 300; mud.Q.value = 1.1;
        mud.gain.value = -3.5 * noiseAmt;

        var lowShelf = offline.createBiquadFilter();
        lowShelf.type = 'lowshelf'; lowShelf.frequency.value = 180; lowShelf.gain.value = warmth;

        var pres = offline.createBiquadFilter();
        pres.type = 'peaking'; pres.frequency.value = 3200; pres.Q.value = 0.8;
        pres.gain.value = clarity * 1.25;

        var air = offline.createBiquadFilter();
        air.type = 'highshelf'; air.frequency.value = 8000; air.gain.value = clarity * 0.85;

        node.connect(hp); hp.connect(hp2); hp2.connect(mud);
        mud.connect(lowShelf); lowShelf.connect(pres); pres.connect(air);
        air.connect(offline.destination);
        node.start(0);
        var rendered = await offline.startRendering();

        if (noiseAmt > 0) {
          for (var c = 0; c < rendered.numberOfChannels; c++) {
            rendered.copyToChannel(spectralDenoise(rendered.getChannelData(c), noiseAmt), c);
          }
        }

        noiseGate(rendered, noiseAmt);
        compress(rendered, -10, 2, 2);

        var targetLvl = 0.24;
        var lvl = getLevel(rendered);
        var gainMul = lvl > 0 ? Math.min(Math.max(targetLvl / lvl, 1), 24) : 1;
        for (var c = 0; c < rendered.numberOfChannels; c++) {
          var ch = rendered.getChannelData(c);
          for (var i = 0; i < ch.length; i++) ch[i] *= gainMul;
        }

        softLimit(rendered, 0.85);
        var peak = getPeak(rendered);
        var ceil = Math.pow(10, -1/20);
        if (peak > ceil) {
          var norm = ceil / peak;
          for (var c = 0; c < rendered.numberOfChannels; c++) {
            var ch = rendered.getChannelData(c);
            for (var i = 0; i < ch.length; i++) ch[i] *= norm;
          }
        }

        enhancedBuf = rendered;
        if (wavUrl) URL.revokeObjectURL(wavUrl);
        wavUrl = URL.createObjectURL(bufToWav(rendered));
        el('audioB').src = wavUrl;
        drawWave(el('canvasB'), rendered, '#6ba83d');
        el('results').classList.add('show');

        var origLvl = getLevel(src), newLvl = getLevel(rendered);
        var gainDb = origLvl > 0 ? 20 * Math.log10(newLvl / origLvl) : 0;
        el('sGain').textContent = (gainDb >= 0 ? '+' : '') + gainDb.toFixed(1) + 'db';
        el('sNoiseStat').textContent = '-' + (noiseAmt * 18).toFixed(1) + 'db';
        el('sDur').textContent = src.duration.toFixed(1) + 's';
        el('sSR').textContent = (src.sampleRate / 1000) + 'khz';
        el('stats').classList.add('show');
        el('downloadBtn').disabled = false;

        var elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        showMsg('✓ done in ' + elapsed + 's', 'ok');
      } catch(err) {
        showMsg('something broke', 'err');
      } finally {
        el('enhanceBtn').disabled = false;
        el('enhanceBtn').innerHTML = 'go';
      }
    }

    function getPeak(buf) {
      var peak = 0;
      for (var c = 0; c < buf.numberOfChannels; c++) {
        var d = buf.getChannelData(c);
        for (var i = 0; i < d.length; i++) {
          var a = Math.abs(d[i]);
          if (a > peak) peak = a;
        }
      }
      return peak;
    }

    function getLevel(buf) {
      var d = buf.getChannelData(0), sr = buf.sampleRate;
      var frameSize = Math.max(1, Math.floor(sr * 0.05));
      var vals = [];
      for (var s = 0; s + frameSize <= d.length; s += frameSize) {
        var sum = 0;
        for (var i = 0; i < frameSize; i++) sum += d[s+i] * d[s+i];
        vals.push(Math.sqrt(sum / frameSize));
      }
      if (!vals.length) return 0;
      vals.sort((a,b) => a-b);
      return vals[Math.floor(vals.length * 0.85)] || vals[vals.length-1];
    }

    function getNoiseFloor(buf) {
      var d = buf.getChannelData(0);
      var win = Math.max(1, Math.floor(buf.sampleRate * 0.15));
      var best = Infinity;
      for (var s = 0; s + win <= d.length; s += win) {
        var sum = 0;
        for (var i = 0; i < win; i++) sum += d[s+i] * d[s+i];
        var rms = Math.sqrt(sum / win);
        if (rms < best) best = rms;
      }
      return isFinite(best) && best > 0 ? 20 * Math.log10(best) : -90;
    }

    function noiseGate(buf, amount) {
      if (amount <= 0) return;
      var sr = buf.sampleRate, ch = buf.numberOfChannels, len = buf.length;
      var chans = [];
      for (var c = 0; c < ch; c++) chans.push(buf.getChannelData(c));
      var floorLin = Math.pow(10, getNoiseFloor(buf) / 20);
      var openT = Math.max(0.0015, floorLin * (3 + amount * 5));
      var closeT = Math.max(0.0008, floorLin * (1.3 + amount * 1.2));
      var floorG = Math.max(0.04, 1 - amount * 1.05);
      var eAtk = Math.exp(-1 / (sr * 0.002));
      var eRel = Math.exp(-1 / (sr * 0.040));
      var env = 0, envArr = new Float32Array(len);
      for (var i = 0; i < len; i++) {
        var s = 0;
        for (var c = 0; c < ch; c++) {
          var a = Math.abs(chans[c][i]);
          if (a > s) s = a;
        }
        env = s > env ? eAtk * env + (1-eAtk)*s : eRel * env + (1-eRel)*s;
        envArr[i] = env;
      }
      var gAtk = Math.exp(-1/(sr*0.003)), gRel = Math.exp(-1/(sr*0.045));
      var g = floorG;
      for (var i = 0; i < len; i++) {
        var e = envArr[i], target;
        if (e >= openT) target = 1;
        else if (e <= closeT) target = floorG;
        else { var r = (e-closeT)/(openT-closeT); target = floorG + (1-floorG)*r*r; }
        g = target < g ? gRel*g + (1-gRel)*target : gAtk*g + (1-gAtk)*target;
        for (var c = 0; c < ch; c++) chans[c][i] *= g;
      }
    }

    function doFFT(re, im, inverse) {
      var n = re.length;
      for (var i = 1, j = 0; i < n; i++) {
        var bit = n >> 1;
        for (; j & bit; bit >>= 1) j ^= bit;
        j ^= bit;
        if (i < j) { var t=re[i]; re[i]=re[j]; re[j]=t; t=im[i]; im[i]=im[j]; im[j]=t; }
      }
      for (var len = 2; len <= n; len <<= 1) {
        var ang = (inverse ? 2 : -2) * Math.PI / len;
        var wlr = Math.cos(ang), wli = Math.sin(ang), half = len >> 1;
        for (var i = 0; i < n; i += len) {
          var wr = 1, wi = 0;
          for (var k = 0; k < half; k++) {
            var a = i+k, b = i+k+half;
            var vr = re[b]*wr - im[b]*wi, vi = re[b]*wi + im[b]*wr;
            re[b]=re[a]-vr; im[b]=im[a]-vi; re[a]+=vr; im[a]+=vi;
            var nwr = wr*wlr - wi*wli; wi = wr*wli + wi*wlr; wr = nwr;
          }
        }
      }
      if (inverse) for (var i = 0; i < n; i++) { re[i]/=n; im[i]/=n; }
    }

    function spectralDenoise(input, amount) {
      if (amount <= 0) return input.slice();
      var N = 2048, hop = 512;
      var win = new Float32Array(N);
      for (var i = 0; i < N; i++) win[i] = 0.5 - 0.5 * Math.cos(2*Math.PI*i/(N-1));
      var len = input.length;
      var re = new Float32Array(N), im = new Float32Array(N);
      var starts = [];
      for (var s = 0; s < len; s += hop) starts.push(s);
      var energy = new Float32Array(starts.length);
      for (var f = 0; f < starts.length; f++) {
        var st = starts[f], e = 0;
        for (var i = 0; i < N; i++) {
          var idx = st+i;
          var val = idx < len ? input[idx] * win[i] : 0;
          e += val * val;
        }
        energy[f] = e;
      }
      var sorted = Float32Array.from(energy).sort();
      var thr = sorted[Math.floor(sorted.length * 0.12)] || sorted[sorted.length-1];
      var noiseP = new Float32Array(N), nCount = 0;
      for (var f = 0; f < starts.length; f++) {
        if (energy[f] > thr) continue;
        var st = starts[f];
        for (var i = 0; i < N; i++) { var idx=st+i; re[i]=idx<len?input[idx]*win[i]:0; im[i]=0; }
        doFFT(re, im, false);
        for (var b = 0; b < N; b++) noiseP[b] += re[b]*re[b] + im[b]*im[b];
        nCount++;
      }
      if (nCount > 0) for (var b = 0; b < N; b++) noiseP[b] = Math.sqrt(noiseP[b] / nCount);
      var out = new Float32Array(len), wsum = new Float32Array(len);
      var beta = 1.5 + amount * 2.5;
      var floorG = Math.max(0.04, 1 - amount * 1.05);
      for (var s = 0; s < starts.length; s++) {
        var st = starts[s];
        for (var i = 0; i < N; i++) { var idx=st+i; re[i]=idx<len?input[idx]*win[i]:0; im[i]=0; }
        doFFT(re, im, false);
        for (var b = 0; b < N; b++) {
          var m = Math.sqrt(re[b]*re[b] + im[b]*im[b]);
          if (m > 0) {
            var g = (m - beta * noiseP[b]) / m;
            if (g < floorG) g = floorG;
            else if (g > 1) g = 1;
            re[b] *= g; im[b] *= g;
          }
        }
        doFFT(re, im, true);
        for (var i = 0; i < N; i++) {
          var idx = st+i;
          if (idx < len) { out[idx] += re[i]*win[i]; wsum[idx] += win[i]*win[i]; }
        }
      }
      for (var i = 0; i < len; i++) if (wsum[i] > 1e-8) out[i] /= wsum[i];
      return out;
    }

    function compress(buf, threshDb, ratio, makeupDb) {
      var sr=buf.sampleRate, ch=buf.numberOfChannels, len=buf.length;
      var chans = [];
      for (var c = 0; c < ch; c++) chans.push(buf.getChannelData(c));
      var thr = Math.pow(10, threshDb/20), makeup = Math.pow(10, makeupDb/20);
      var atk = Math.exp(-1/(sr*0.005)), rel = Math.exp(-1/(sr*0.120));
      var env = 0;
      for (var i = 0; i < len; i++) {
        var s = 0;
        for (var c = 0; c < ch; c++) { var a=Math.abs(chans[c][i]); if(a>s)s=a; }
        env = s > env ? atk*env+(1-atk)*s : rel*env+(1-rel)*s;
        var g = env > thr ? Math.pow(env/thr, 1/ratio-1) : 1;
        for (var c = 0; c < ch; c++) chans[c][i] *= g * makeup;
      }
    }

    function softLimit(buf, threshold) {
      var range = 1 - threshold;
      for (var c = 0; c < buf.numberOfChannels; c++) {
        var d = buf.getChannelData(c);
        for (var i = 0; i < d.length; i++) {
          var x = d[i], a = Math.abs(x);
          if (a > threshold) {
            var over = (a - threshold) / range;
            d[i] = Math.sign(x) * (threshold + range * Math.tanh(over));
          }
        }
      }
    }

    function bufToWav(buf) {
      var numCh=buf.numberOfChannels, sr=buf.sampleRate, frames=buf.length;
      var blockAlign=numCh*2, dataSize=frames*blockAlign;
      var ab=new ArrayBuffer(44+dataSize), view=new DataView(ab);
      function ws(o,s){ for(var i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); }
      ws(0,'RIFF'); view.setUint32(4, 36+dataSize, true);
      ws(8,'WAVE'); ws(12,'fmt ');
      view.setUint32(16,16,true); view.setUint16(20,1,true);
      view.setUint16(22,numCh,true); view.setUint32(24,sr,true);
      view.setUint32(28,sr*blockAlign,true); view.setUint16(32,blockAlign,true);
      view.setUint16(34,16,true); ws(36,'data'); view.setUint32(40,dataSize,true);
      var chans = [];
      for (var c=0; c<numCh; c++) chans.push(buf.getChannelData(c));
      var off = 44;
      for (var i=0; i<frames; i++) {
        for (var c=0; c<numCh; c++) {
          var s = Math.max(-1, Math.min(1, chans[c][i]));
          view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
          off += 2;
        }
      }
      return new Blob([ab], { type: 'audio/wav' });
    }

    function doDownload() {
      if (!wavUrl) return;
      var a = document.createElement('a');
      a.href = wavUrl;
      var name = (origFile ? origFile.name.replace(/\.[^.]+$/, '') : 'audio') + '-cleaned.wav';
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      showMsg('✓ got it', 'ok');
    }

    function clearAll() {
      audioBuffer = null;
      enhancedBuf = null;
      origFile = null;
      if (wavUrl) { URL.revokeObjectURL(wavUrl); wavUrl = null; }
      el('fileInput').value = '';
      el('filebox').classList.remove('show');
      el('controls').style.display = 'none';
      el('results').classList.remove('show');
      el('stats').classList.remove('show');
      el('audioA').src = '';
      el('audioB').src = '';
      el('downloadBtn').disabled = true;
      hideMsg();
    }

    window.addEventListener('resize', () => {
      if (audioBuffer) drawWave(el('canvasA'), audioBuffer, '#c44569');
      if (enhancedBuf) drawWave(el('canvasB'), enhancedBuf, '#6ba83d');
    });
  </script>
</body>
